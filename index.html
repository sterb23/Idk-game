<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Fidelity 3D Dodger (Tilt Controls)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #top-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #score {
            font-size: 24px;
            font-weight: bold;
        }
        select, .ui-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
        }
        #game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            pointer-events: auto;
            border: 1px solid #333;
            z-index: 10;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="score">Score: 0</div>
            <div>
                <button id="tilt-btn" class="ui-btn" onclick="initTilt()">Enable Tilt Controls</button>
                <select id="quality" onchange="changeQuality(this.value)">
                    <option value="high">High Graphics</option>
                    <option value="med">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="margin-top:0; color:#ff4444;">GAME OVER</h1>
        <h2 id="final-score">Score: 0</h2>
        <button onclick="resetGame()">Tap to Restart</button>
    </div>

    <script>
        // --- Game Setup & Three.js Init ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.04);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 10);
        camera.lookAt(0, 0, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Materials ---
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.9, roughness: 0.1 });
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.2, roughness: 0.8 });
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.2 });

        // --- Objects ---
        const player = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), playerMat);
        player.position.y = 0.8;
        player.castShadow = true;
        scene.add(player);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Game Logic Variables ---
        let obstacles = [];
        let gameSpeed = 0.3;
        let score = 0;
        let isGameOver = false;
        
        // Steering variables
        const playerSpeed = 0.2;
        let moveLeft = false;
        let moveRight = false;
        let tiltX = 0; // Tracks phone roll angle
        let useTilt = false;

        // --- Keyboard Controls (PC Fallback) ---
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
            if(e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
            if(e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
        });

        // --- Tilt Controls Logic ---
        function initTilt() {
            // Check if iOS requires permission
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            activateTiltListener();
                        } else {
                            alert('Permission to access accelerometer was denied.');
                        }
                    })
                    .catch(console.error);
            } else {
                // Android or older browsers don't require explicit permission prompts
                activateTiltListener();
            }
        }

        function activateTiltListener() {
            useTilt = true;
            document.getElementById('tilt-btn').innerText = "Tilt Active";
            document.getElementById('tilt-btn').style.background = "#28a745";
            
            window.addEventListener('deviceorientation', (event) => {
                // gamma is the left-to-right tilt in degrees (-90 to 90)
                if (event.gamma !== null) {
                    tiltX = event.gamma; 
                }
            });
        }

        // --- Graphics Settings ---
        function changeQuality(level) {
            let pixelRatio = window.devicePixelRatio;
            if (level === 'med') pixelRatio = window.devicePixelRatio * 0.75;
            if (level === 'low') pixelRatio = window.devicePixelRatio * 0.5;
            
            renderer.setPixelRatio(pixelRatio);
            renderer.shadowMap.enabled = (level !== 'low');
            dirLight.castShadow = (level !== 'low');
            
            scene.traverse((child) => {
                if (child.material) child.material.needsUpdate = true;
            });
        }
        changeQuality('high');

        // --- Obstacle Spawning ---
        function spawnObstacle() {
            if(isGameOver) return;
            const size = 1 + Math.random() * 1.5;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), obstacleMat);
            
            const startX = (Math.random() - 0.5) * 15;
            obs.position.set(startX, size/2, -50);
            obs.castShadow = true;
            obs.receiveShadow = true;
            
            scene.add(obs);
            obstacles.push(obs);
            
            setTimeout(spawnObstacle, 1000 - (gameSpeed * 100));
        }
        spawnObstacle();

        // --- Main Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (isGameOver) return;

            // Handle Movement Input (Tilt vs Keyboard)
            if (useTilt) {
                // Deadzone of 3 degrees to prevent accidental drifting.
                // Map tilt angle to horizontal movement intensity.
                if (Math.abs(tiltX) > 3) {
                    const tiltIntensity = Math.min(Math.max(tiltX / 30, -1), 1); // Clamp between -1 and 1
                    player.position.x += tiltIntensity * playerSpeed;
                }
            } else {
                if (moveLeft) player.position.x -= playerSpeed;
                if (moveRight) player.position.x += playerSpeed;
            }

            // Keep player bounded on the track
            player.position.x = Math.min(Math.max(player.position.x, -8), 8);

            // Visual ball roll matching game speed
            player.rotation.x -= gameSpeed;

            // Move Obstacles and Check Collisions
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += gameSpeed;

                const distanceX = Math.abs(player.position.x - obs.position.x);
                const distanceZ = Math.abs(player.position.z - obs.position.z);
                const collisionThreshold = (obs.geometry.parameters.width / 2) + 0.6; 

                if (distanceX < collisionThreshold && distanceZ < collisionThreshold) {
                    gameOver();
                }

                if (obs.position.z > 15) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                    gameSpeed += 0.005;
                }
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = "Final Score: " + score;
        }

        function resetGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            score = 0;
            gameSpeed = 0.3;
            player.position.x = 0;
            isGameOver = false;
            
            document.getElementById('score').innerText = "Score: 0";
            document.getElementById('game-over').style.display = 'none';
            
            spawnObstacle();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
