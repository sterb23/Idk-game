<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM: Tribute Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none;
        }
        /* 320x200 DOS Retro Scaling */
        #game-viewport {
            width: 100vw; height: calc(100vh - 60px);
            display: block;
            image-rendering: crisp-edges; image-rendering: pixelated;
            background: #111;
        }
        
        /* UI Layers */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        
        /* Main Retro Menu */
        .menu-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #0f0000; color: #ff3333; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; pointer-events: auto;
            border: 8px solid #333; box-sizing: border-box; text-align: center;
        }
        .menu-screen h1 { font-size: 54px; margin: 0; text-shadow: 4px 4px #000; letter-spacing: 4px; }
        .menu-panel {
            background: #1a0505; border: 3px dashed #ff3333; padding: 20px; 
            max-width: 500px; margin: 15px; color: #fff; font-size: 14px; line-height: 1.5;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        
        .menu-btn {
            background: #330000; color: #ff9999; border: 2px solid #ff3333;
            padding: 12px 30px; font-family: inherit; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 20px; width: 100%; box-sizing: border-box;
            transition: all 0.1s ease;
        }
        .menu-btn:hover {
            background: #ff3333; color: #000; box-shadow: 0 0 10px #ff3333;
        }

        /* Classic Retro Status Bar HUD */
        #hud {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #222; border-top: 4px solid #444; color: #ff3333;
            display: flex; justify-content: space-around; align-items: center;
            font-size: 14px; pointer-events: auto; box-sizing: border-box;
            font-weight: bold; text-shadow: 2px 2px #000;
        }
        .hud-stat { text-align: center; flex: 1; border-right: 2px solid #333; }
        .hud-stat:last-child { border-right: none; }
        .hud-stat span { display: block; color: #ffcc00; font-size: 24px; font-family: 'Arial Black', sans-serif; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="menu-screen">
            <h1>DOOM</h1>
            <div style="color: #888; font-size: 12px; letter-spacing: 2px; margin-bottom: 10px;">TRIBUTE ENGINE</div>
            <div class="menu-panel">
                <p>Welcome back, Marine. You are looking at a hardware-accelerated, canvas-driven retro simulation layer running at a crisp 320x200 pixel block format.</p>
                <button class="menu-btn" onclick="startTribute()">START MISSION</button>
            </div>
        </div>

        <div id="hud" class="hidden">
            <div class="hud-stat">AMMO <span>050</span></div>
            <div class="hud-stat">HEALTH <span>100%</span></div>
            <div class="hud-stat">ARMOR <span>00%</span></div>
            <div class="hud-stat">BULL <span>200</span></div>
        </div>
    </div>

    <canvas id="game-viewport" width="320" height="200"></canvas>

    <script>
        const canvas = document.getElementById('game-viewport');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let tick = 0;

        function startTribute() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            gameRunning = true;
            gameLoop();
        }

        // A simple pseudo-3D floor, ceiling, and wall scroller to emulate 90s engines
        function renderScene() {
            tick++;
            
            // 1. Draw Ceiling (Dark Blue/Gray)
            ctx.fillStyle = '#14141c';
            ctx.fillRect(0, 0, 320, 100);
            
            // 2. Draw Floor (Dark Brown/Gray)
            ctx.fillStyle = '#221a15';
            ctx.fillRect(0, 100, 320, 100);

            // 3. Render Pseudo-3D Walls (Raycast Simulator Effect)
            const totalColumns = 80; // Grouping pixels to make it look chunky
            const colWidth = 320 / totalColumns;

            for (let i = 0; i < totalColumns; i++) {
                // Generates a wavy wall corridor perspective
                const distance = 1.5 + Math.abs(Math.sin((i + tick * 0.5) * 0.08) * 3);
                const wallHeight = Math.min(200, 180 / distance);
                const yTop = (200 - wallHeight) / 2;

                // Alternate wall slice shading for depth texturing
                const baseColor = (i % 2 === 0) ? 110 : 80;
                // Dim the color further based on distance (Atmospheric fogging)
                const shade = Math.max(20, baseColor - (distance * 15));
                
                ctx.fillStyle = `rgb(${shade}, ${shade * 0.2}, ${shade * 0.2})`;
                ctx.fillRect(i * colWidth, yTop, colWidth, wallHeight);
                
                // Add a simple grid/border overlay to slices for texture illusion
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                if (i % 4 === 0) ctx.fillRect(i * colWidth, yTop, 1, wallHeight);
            }

            // 4. Draw Crosshair
            ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
            ctx.fillRect(159, 99, 2, 2);
        }

        function gameLoop() {
            if (!gameRunning) return;
            renderScene();
            requestAnimationFrame(gameLoop);
        }

        // Basic resize handler to keep aspect ratio scaling crisp
        window.addEventListener('resize', () => {
            canvas.style.width = '100vw';
            canvas.style.height = (window.innerHeight - 60) + 'px';
        });
    </script>
</body>
</html>
