<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM: Tribute Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none;
        }
        /* 320x200 DOS Retro Scaling */
        #game-viewport {
            width: 100vw; height: calc(100vh - 60px);
            display: block;
            image-rendering: crisp-edges; image-rendering: pixelated;
        }
        
        /* UI Layers */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        
        /* Main Retro Menu */
        .menu-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #111; color: #ff3333; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; pointer-events: auto;
            border: 8px solid #333; box-sizing: border-box; text-align: center;
        }
        .menu-screen h1 { font-size: 48px; margin-bottom: 5px; text-shadow: 3px 3px #000; }
        .menu-panel {
            background: #222; border: 3px dashed #ff3333; padding: 20px; 
            max-width: 500px; margin: 15px; color: #fff; font-size: 14px; line-height: 1.5;
        }
        .menu-btn {
            background: #cc0000; color: white; border: 3px solid #ff3333;
            padding: 12px 30px; font-size: 20px; font-weight: bold; cursor: pointer;
            font-family: inherit; margin-top: 10px; box-shadow: 4px 4px 0px #000;
        }
        .menu-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* HUD Status Bar */
        #doom-hud {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #2c2c2c; border-top: 4px solid #444;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            color: #ff3333; font-size: 20px; font-weight: bold; pointer-events: auto;
        }
        .hud-stat { text-align: center; background: #151515; padding: 3px 12px; border: 2px solid #555; width: 80px;}
        .hud-stat span { color: #888; display: block; font-size: 11px; margin-bottom: 2px; }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,0,0,0.4); font-size: 20px; pointer-events: none;
        }

        /* 2D Weapon Sprite Viewport Layer */
        #weapon-container {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 200px; pointer-events: none; overflow: hidden;
        }
        #weapon-canvas {
            width: 100%; height: 100%; image-rendering: pixelated;
        }

        /* Mobile Virtual Joystick Environment */
        #mobile-container {
            position: absolute; bottom: 80px; left:0; width:100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px; box-sizing: border-box; pointer-events: none;
        }
        #joystick-zone {
            width: 120px; height: 120px; background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            position: relative; pointer-events: auto; display: none;
        }
        #joystick-stick {
            width: 44px; height: 44px; background: #ff3333; border-radius: 50%;
            position: absolute; top: 38px; left: 38px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
