<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM: Tribute Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none;
        }
        /* 320x200 DOS Retro Scaling */
        #game-viewport {
            width: 100vw; height: calc(100vh - 60px);
            display: block;
            image-rendering: crisp-edges; image-rendering: pixelated;
        }
        
        /* UI Layers */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        
        /* Main Retro Menu */
        .menu-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #111; color: #ff3333; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; pointer-events: auto;
            border: 8px solid #333; box-sizing: border-box; text-align: center;
        }
        .menu-screen h1 { font-size: 48px; margin-bottom: 5px; text-shadow: 3px 3px #000; }
        .menu-panel {
            background: #222; border: 3px dashed #ff3333; padding: 20px; 
            max-width: 500px; margin: 15px; color: #fff; font-size: 14px; line-height: 1.5
