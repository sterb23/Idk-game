<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Commando: Polygon Outbreak</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050505; font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none; color: #00ff00;
        }
        canvas { display: block; }
        
        /* UI Layer */
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        #hud {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }
        #stats { font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
        
        select, .btn {
            background: #000; color: #00ff00; border: 2px solid #00ff00;
            padding: 8px 12px; font-family: inherit; font-size: 14px; cursor: pointer;
        }
        .btn:active { background: #00ff00; color: #000; }

        /* Mobile Layout */
        #mobile-controls {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 30px; pointer-events: auto; gap: 20px;
        }
        .move-btns { display: flex; gap: 15px; }
        .touch-btn {
            width: 70px; height: 70px; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }
        #fire-btn {
            width: 100px; height: 100px; background: #ff0055; color: #fff; border-color: #ff0055;
            font-size: 20px; border-radius: 50%; text-shadow: 0 0 5px #fff;
        }
        #fire-btn:active { background: #fff; color: #ff0055; }

        /* Game Screens */
        .screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 3px solid #00ff00; padding: 40px;
            text-align: center; pointer-events: auto; z-index: 100; box-shadow: 0 0 20px #00ff00;
        }
        .screen h1 { margin-top: 0; font-size: 32px; letter-spacing: 2px; }
        .screen button {
            margin-top: 20px; padding: 12px 24px; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <div id="ui-container">
        <div id="hud">
            <div id="stats">SCORE: 0000 | AMMO: 30</div>
            <select id="quality" onchange="changeQuality(this.value)">
                <option value="high">Graphics: Fancy Potato</option>
                <option value="low">Graphics: Literal Potato</option>
            </select>
        </div>

        <div id="mobile-controls">
            <div class="move-btns">
                <div class="btn touch-btn" id="left-btn">◀</div>
                <div class="btn touch-btn" id="right-btn">▶</div>
            </div>
            <div class="btn touch-btn" id="fire-btn">FIRE</div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>BUDGET COMMANDO</h1>
        <p>Defend the low-poly grid from invading shapes.</p>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <div id="game-over" class="screen" style="display: none;">
        <h1 style="color: #ff0055; text-shadow: 0 0 5px #ff0055;">MISSION FAILED</h1>
        <h3 id="final-score">SCORE: 0</h3>
        <button class="btn" onclick="resetGame()">RETRY</button>
    </div>

    <script>
        // --- Low-Budget Synthetic Sound Generator (Web Audio API) ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pew') { // Laser Sound
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'boom') { // Explosion
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'click') { // Empty Gun Click
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 2, 0); // Player starting viewpoint

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x112211, 1.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x00ff00, 1.0);
        dirLight.position.set(5, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Environment Floor (Retro Wireframe Grid) ---
        const gridHelper = new THREE.GridHelper(100, 40, 0x00ff00, 0x004400);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x050a05, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Player Blaster (Low-poly Gun model attached to camera) ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.3, 1.2),
            new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.2 })
        );
        gunBody.position.set(0.5, -0.4, -1.0); // Offset to bottom right of screen
        gunBody.castShadow = true;
        gunGroup.add(gunBody);

        const gunBarrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.06, 0.4),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        gunBarrel.rotateX(Math.PI / 2);
        gunBarrel.position.set(0.5, -0.35, -1.6);
        gunGroup.add(gunBarrel);

        camera.add(gunGroup);
        scene.add(camera); // Adding camera to scene reveals its children (the gun)

        // --- Game System Variables ---
        let enemies = [];
        let bullets = [];
        let score = 0;
        let ammo = 30;
        let isPlaying = false;
        let isGameOver = false;
        let gameSpeed = 0.15;
        let reloadTimer = 0;

        // Input Arrays
        let moveLeft = false;
        let moveRight = false;

        // --- Game Logic Handling ---
        function startGame() {
            initAudio();
            isPlaying = true;
            document.getElementById('start-screen').style.display = 'none';
        }

        function fireWeapon() {
            if (!isPlaying || isGameOver) return;
            if (ammo <= 0) {
                playSound('click');
                // Auto-reload mechanical delay
                if(reloadTimer === 0) {
                    reloadTimer = setTimeout(() => {
                        ammo = 30;
                        updateHUD();
                        reloadTimer = 0;
                    }, 1500);
                }
                return;
            }

            ammo--;
            updateHUD();
            playSound('pew');

            // Recoil animation effect
            gunGroup.position.z += 0.2;

            // Spawn Projectile
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            b.position.set(camera.position.x + 0.5, camera.position.y - 0.35, camera.position.z - 1.6);
            scene.add(b);
            bullets.push(b);
        }

        function spawnEnemy() {
            if (!isPlaying || isGameOver) return;

            // Simple low-budget shapes (Cubes, Pyramids, Cylinders)
            const shapes = [
                new THREE.BoxGeometry(1.5, 1.5, 1.5),
                new THREE.ConeGeometry(1, 2, 4),
                new THREE.CylinderGeometry(0.8, 0.8, 1.8, 6)
            ];
            
            const randomGeo = shapes[Math.floor(Math.random() * shapes.length)];
            const enemyMat = new THREE.MeshStandardMaterial({ 
                color: Math.random() > 0.5 ? 0xff0055 : 0xffaa00, 
                flatShading: true 
            });

            const enemy = new THREE.Mesh(randomGeo, enemyMat);
            enemy.position.set((Math.random() - 0.5) * 30, 1, -60); // Random horizon span
            enemy.castShadow = true;
            
            scene.add(enemy);
            enemies.push(enemy);

            // Dynamic scaling spawn speed based on progression
            setTimeout(spawnEnemy, Math.max(400, 2000 - (score * 5)));
        }
        setTimeout(spawnEnemy, 2000);

        // --- Main System Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying && !isGameOver) {
                // Return weapon from recoil slowly
                gunGroup.position.z += (0 - gunGroup.position.z) * 0.1;

                // Handle Player Locomotion
                if (moveLeft && camera.position.x > -18) camera.position.x -= 0.25;
                if (moveRight && camera.position.x < 18) camera.position.x += 0.25;

                // Update Projectiles
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].position.z -= 1.5; // High velocity forward
                    
                    // Out of bounds cleaning
                    if (bullets[i].position.z < -70) {
                        scene.remove(bullets[i]);
                        bullets.splice(i, 1);
                    }
                }

                // Update Invading Fleet
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i];
                    enemy.position.z += gameSpeed;
                    enemy.rotation.y += 0.02; // Rotate for dynamic feel

                    // Check if enemies breach base defense lines
                    if (enemy.position.z > 2) {
                        triggerGameOver();
                    }

                    // Collision Detection (Simple Radius Check)
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let dist = enemy.position.distanceTo(bullets[j].position);
                        if (dist < 1.5) { // Impact match
                            playSound('boom');
                            
                            // Visual deletion processing
                            scene.remove(enemy);
                            enemies.splice(i, 1);
                            scene.remove(bullets[j]);
                            bullets.splice(j, 1);

                            score += 100;
                            gameSpeed += 0.002; // Game accelerates
                            updateHUD();
                            break;
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- UI & Controls Plumbing ---
        function updateHUD() {
            document.getElementById('stats').innerText = 
                `SCORE: ${String(score).padStart(4, '0')} | AMMO: ${reloadTimer ? 'RELOADING' : ammo}`;
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = "SCORE: " + score;
        }

        function resetGame() {
            enemies.forEach(e => scene.remove(e));
            bullets.forEach(b => scene.remove(b));
            enemies = [];
            bullets = [];
            score = 0;
            ammo = 30;
            gameSpeed = 0.15;
            camera.position.x = 0;
            isGameOver = false;
            updateHUD();
            document.getElementById('game-over').style.display = 'none';
        }

        function changeQuality(val) {
            if (val === 'low') {
                renderer.shadowMap.enabled = false;
                dirLight.castShadow = false;
                scene.fog.density = 0.05; // Dense fog to cover object dropoff performance tricks
            } else {
                renderer.shadowMap.enabled = true;
                dirLight.castShadow = true;
                scene.fog.density = 0.02;
            }
            scene.traverse(c => { if(c.material) c.material.needsUpdate = true; });
        }

        // Setup Event Listeners (PC Input mapping)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'ArrowLeft') moveLeft = true;
            if (e.key === 'd' || e.key === 'ArrowRight') moveRight = true;
            if (e.key === ' ') fireWeapon();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'ArrowLeft') moveLeft = false;
            if (e.key === 'd' || e.key === 'ArrowRight') moveRight = false;
        });

        // Touch Hooks (Mobile optimization mapping)
        const bindTouch = (id, callback) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); callback(true); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); callback(false); });
        };
        bindTouch('left-btn', (state) => moveLeft = state);
        bindTouch('right-btn', (state) => moveRight = state);
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); fireWeapon(); });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
